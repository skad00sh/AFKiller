name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}  # manual trigger to test the build without cutting a release

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: AFKiller-macos.zip
          - os: windows-latest
            artifact: AFKiller-windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install deps (incl. build group)
        run: uv sync --group build

      - name: Build macOS .app
        if: runner.os == 'macOS'
        run: |
          uv run pyinstaller \
            --noconfirm \
            --name AFKiller \
            --windowed \
            --osx-bundle-identifier com.skad00sh.afkiller \
            --icon assets/icon.icns \
            --add-data "assets/icon.png:assets" \
            --collect-all pystray \
            --collect-all PIL \
            src/afkiller/__main__.py
          # Hide Dock icon — pure menu-bar app.
          plutil -insert LSUIElement -bool true "dist/AFKiller.app/Contents/Info.plist"
          # Editing the plist invalidates PyInstaller's signature; re-sign ad-hoc
          # or Gatekeeper reports the app as "damaged" on download.
          codesign --force --deep --sign - "dist/AFKiller.app"
          ditto -c -k --sequesterRsrc --keepParent "dist/AFKiller.app" "${{ matrix.artifact }}"

      - name: Build Windows .exe
        if: runner.os == 'Windows'
        shell: bash
        run: |
          uv run pyinstaller \
            --noconfirm \
            --name AFKiller \
            --windowed \
            --onefile \
            --icon assets/icon.ico \
            --add-data "assets/icon.png;assets" \
            --collect-all pystray \
            --collect-all PIL \
            src/afkiller/__main__.py
          mv "./dist/AFKiller.exe" "${{ matrix.artifact }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          # Tags with a pre-release suffix (e.g. v0.2.0-rc1, v0.2.0-beta) publish as a
          # pre-release; clean tags (v0.2.0) publish as a full release.
          prerelease: ${{ contains(github.ref_name, '-') }}
